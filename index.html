<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>CHERRY CLUB — 매거진</title>
<meta name="description" content="CUTE IS THE RULE. 지금 잘 나가는 것만 골라주는 쇼핑 매거진.">
<meta property="og:title" content="CHERRY CLUB — 매거진">
<meta property="og:description" content="CUTE IS THE RULE. 데일리룩 · 트렌드 큐레이션">
<meta property="og:image" content="logo.png">
<meta name="theme-color" content="#F06BA0">
<link rel="icon" href="logo.png">
<style>
  :root{
    --hot:#F06BA0; --rose:#D96E9A; --soft:#F2A7C3; --mist:#FBDCE8;
    --ink:#5C2A44; --deep:#3B1229; --muted:#9B7288;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{
    font-family:"Pretendard","Apple SD Gothic Neo","Noto Sans KR",system-ui,-apple-system,sans-serif;
    background:
      radial-gradient(1200px 600px at 50% -10%, #FBDCE8 0%, transparent 60%),
      linear-gradient(180deg,#FFF6FA 0%,#FDEAF2 100%);
    color:var(--ink); min-height:100vh;
    display:flex; justify-content:center;
    padding:30px 18px calc(44px + env(safe-area-inset-bottom));
  }
  .wrap{width:100%;max-width:460px}

  /* 헤더 */
  header{text-align:center;margin-bottom:18px}
  .logo{width:96px;height:96px;border-radius:50%;display:block;margin:0 auto 12px;
    box-shadow:0 8px 28px rgba(240,107,160,.35), 0 0 0 4px #fff}
  .handle{font-size:19px;font-weight:800;letter-spacing:-.02em}
  .tag{margin-top:6px;font-size:11px;font-weight:800;letter-spacing:.18em;color:var(--hot)}
  .desc{margin-top:9px;font-size:13.5px;line-height:1.55;color:var(--muted)}
  .social{display:flex;justify-content:center;gap:9px;margin-top:13px}
  .social a{width:38px;height:38px;border-radius:50%;background:#fff;border:1.5px solid var(--mist);
    display:grid;place-items:center;font-size:16px;text-decoration:none;
    box-shadow:0 2px 8px rgba(92,42,68,.06);transition:transform .12s,border-color .12s}
  .social a:active{transform:scale(.92)}

  .notice{margin-top:16px;border-radius:14px;padding:12px 14px;font-size:13px;line-height:1.5;
    background:linear-gradient(135deg,var(--hot),var(--rose));color:#fff;
    box-shadow:0 6px 18px rgba(240,107,160,.3)}

  /* DM 고정 버튼 */
  a.dm{display:flex;align-items:center;gap:12px;margin-top:16px;
    background:linear-gradient(135deg,var(--hot),var(--rose));border-radius:16px;
    padding:14px 16px;text-decoration:none;color:#fff;
    box-shadow:0 8px 22px rgba(240,107,160,.38)}
  a.dm .ic{flex:0 0 36px;height:36px;border-radius:10px;background:rgba(255,255,255,.22);
    display:grid;place-items:center;font-size:16px}
  a.dm b{display:block;font-size:14.5px;font-weight:800}
  a.dm span{display:block;font-size:11.5px;color:rgba(255,255,255,.88);margin-top:2px}

  /* 탭 */
  .tabs{display:flex;gap:7px;margin:24px 0 16px}
  .tabs button{
    flex:1;border:1.5px solid var(--mist);background:#fff;color:var(--muted);
    border-radius:999px;padding:9px 0;font-size:12.5px;font-weight:700;cursor:pointer;
    font-family:inherit;transition:all .15s;
  }
  .tabs button.on{
    background:linear-gradient(135deg,var(--hot),var(--rose));color:#fff;border-color:transparent;
    box-shadow:0 4px 14px rgba(240,107,160,.32);
  }

  .sec-h{display:flex;align-items:center;gap:7px;font-size:12px;font-weight:800;
    letter-spacing:.04em;color:var(--ink);margin:26px 4px 11px}
  .sec-h .bar{flex:1;height:1px;background:linear-gradient(90deg,var(--soft),transparent)}
  .sec-h .cnt{font-size:10px;font-weight:700;color:var(--rose);
    background:rgba(240,107,160,.12);padding:2px 7px;border-radius:999px}

  /* 최신호 — 대형 카드 */
  .feature{
    background:#fff;border:1.5px solid var(--mist);border-radius:20px;overflow:hidden;
    box-shadow:0 8px 26px rgba(92,42,68,.08);
  }
  .feature .cover{width:100%;aspect-ratio:4/5;object-fit:cover;display:block;background:var(--mist)}
  .feature .body{padding:15px 16px 16px}

  /* 지난 호 — 리스트 */
  .issue{
    background:#fff;border:1.5px solid var(--mist);border-radius:16px;overflow:hidden;
    margin-bottom:10px;box-shadow:0 2px 10px rgba(92,42,68,.05);
  }
  .issue .row{display:flex;gap:12px;padding:11px;align-items:center;cursor:pointer}
  .issue .row:active{background:#FFF6FA}
  .issue .th{flex:0 0 60px;width:60px;height:75px;border-radius:10px;object-fit:cover;
    background:var(--mist);display:block}

  .meta{font-size:10.5px;font-weight:700;color:var(--rose);letter-spacing:.02em}
  .ttl{font-size:14px;font-weight:800;line-height:1.35;margin-top:3px;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .sub{font-size:11.5px;color:var(--muted);margin-top:4px}
  .chev{margin-left:auto;color:var(--soft);font-size:15px;transition:transform .2s}
  .open .chev{transform:rotate(90deg)}

  /* 상품 목록 (펼침) */
  .prods{display:none;border-top:1.5px dashed var(--mist);padding:11px 13px 13px}
  .open .prods{display:block}
  a.prod{
    display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:12px;
    text-decoration:none;color:var(--ink);background:#FFF6FA;margin-bottom:7px;
    border:1px solid transparent;transition:border-color .12s,transform .12s;
  }
  a.prod:active{transform:scale(.985)}
  a.prod .n{flex:0 0 20px;height:20px;border-radius:6px;background:var(--hot);color:#fff;
    font-size:10.5px;font-weight:800;display:grid;place-items:center}
  a.prod .pn{flex:1;font-size:12.5px;font-weight:600;line-height:1.35}
  a.prod .go{font-size:11px;font-weight:800;color:var(--hot);white-space:nowrap}
  .prod.dead{background:#fff;border:1px dashed var(--mist);color:#B08CA0}
  .prod.dead .n{background:var(--mist);color:var(--muted)}
  .prod.dead .go{color:#C9A5B6}

  a.post{
    display:block;text-align:center;margin-top:8px;padding:9px;border-radius:12px;
    background:#fff;border:1.5px solid var(--mist);text-decoration:none;
    font-size:12px;font-weight:700;color:var(--rose);
  }

  .empty{border:1.5px dashed var(--mist);border-radius:16px;padding:16px;
    font-size:12.5px;color:#B08CA0;background:rgba(255,255,255,.5);text-align:center}

  /* 검색 */
  .search{position:relative;margin:12px 0 2px}
  .search input{
    width:100%;border:1.5px solid var(--mist);background:#fff;border-radius:999px;
    padding:11px 38px 11px 38px;font-size:13px;font-family:inherit;color:var(--ink);
    box-shadow:0 2px 10px rgba(92,42,68,.05);outline:none;transition:border-color .15s,box-shadow .15s}
  .search input:focus{border-color:var(--soft);box-shadow:0 4px 16px rgba(240,107,160,.18)}
  .search input::placeholder{color:#C9A5B6}
  .search .mag{position:absolute;left:14px;top:50%;transform:translateY(-50%);
    font-size:13px;color:var(--soft);pointer-events:none}
  .search .clr{position:absolute;right:8px;top:50%;transform:translateY(-50%);
    width:24px;height:24px;border:none;border-radius:50%;background:var(--mist);color:var(--rose);
    font-size:13px;font-weight:800;cursor:pointer;display:none;line-height:1;font-family:inherit}
  .search.has .clr{display:block}
  .hits{margin:10px 4px 0;font-size:11.5px;font-weight:700;color:var(--rose)}
  mark{background:rgba(240,107,160,.22);color:var(--deep);border-radius:4px;padding:0 2px;font-weight:800}

  footer{margin-top:34px;text-align:center;font-size:10.5px;line-height:1.7;color:#B08CA0}
  footer .ad{display:inline-block;margin-bottom:8px;padding:5px 10px;border-radius:999px;
    background:rgba(240,107,160,.1);color:var(--rose);font-weight:700;font-size:10px}
</style>
</head>
<body>
<div class="wrap">

  <header>
    <img class="logo" src="logo.png" alt="CHERRY CLUB">
    <div class="handle">@cherry.clubs2</div>
    <div class="tag">CUTE IS THE RULE</div>
    <p class="desc">지금 잘 나가는 것만 골라주는 쇼핑 매거진.<br>살까 말까 하는 고민을 줄여드려요.</p>
    <nav class="social" id="social"></nav>
  </header>

  <div id="notice"></div>

  <a class="dm" href="https://ig.me/m/cherry.clubs2" target="_blank" rel="noopener">
    <span class="ic">💌</span>
    <span><b>찾는 아이템 있으세요?</b><span>DM 주시면 대신 골라드려요</span></span>
  </a>

  <div class="tabs" id="tabs">
    <button data-c="all" class="on">전체</button>
    <button data-c="fashion">👗 패션</button>
    <button data-c="beauty">💄 뷰티</button>
  </div>

  <div class="search" id="search">
    <span class="mag">🔍</span>
    <input id="q" type="search" autocomplete="off"
           placeholder="브랜드 · 아이템 · 호수로 찾기 (예: 레인부츠)">
    <button class="clr" id="clr" aria-label="지우기">✕</button>
  </div>
  <div class="hits" id="hits"></div>

  <main id="app"></main>

  <footer>
    <span class="ad">일부 링크는 제휴 링크입니다</span><br>
    구매 시 수수료를 받을 수 있으며, 가격은 동일합니다.<br>
    © CHERRY CLUB
  </footer>

</div>

<script>
const TRACK = "https://peppy-duck-1231.navlafilm-sys.deno.net/c";
const esc = s => String(s ?? "").replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const track = (id, url) => `${TRACK}?id=${encodeURIComponent(id)}&u=${encodeURIComponent(url)}`;

let DATA = { issues: [] };
let CAT = "all";
let Q = "";

const norm = s => String(s ?? "").toLowerCase().replace(/\s+/g, "");
const hi = s => {
  const t = esc(s);
  if (!Q) return t;
  // 공백 무시 매칭이라 원문 기준으로 다시 찾음
  const i = norm(s).indexOf(norm(Q));
  if (i < 0) return t;
  const re = new RegExp(Q.trim().split("").map(c =>
    c.replace(/[.*+?^${}()|[\]\\]/g, "\\$&")).join("\\s*"), "i");
  return t.replace(re, m => `<mark>${m}</mark>`);
};
const matchIssue = i =>
  !Q || norm(i.title).includes(norm(Q)) || norm(i.no + "호").includes(norm(Q)) ||
  (i.items || []).some(p => norm(p.name).includes(norm(Q)));

function prodList(iss){
  let items = iss.items || [];
  if (Q) {
    const hit = items.filter(p => norm(p.name).includes(norm(Q)));
    if (hit.length) items = hit;   // 아이템이 걸리면 그것만 보여줌
  }
  if (!items.length) return `<div class="empty" style="padding:12px;font-size:12px">상품 링크 준비 중이에요 🍒</div>`;
  const base = iss.items || [];
  return items.map((p) => {
    const n = String(base.indexOf(p) + 1).padStart(2, "0");
    if (!p.url) {
      return `<div class="prod dead">
        <span class="n">${n}</span>
        <span class="pn">${hi(p.name)}</span>
        <span class="go">준비중</span>
      </div>`;
    }
    return `<a class="prod" href="${esc(track(iss.no + ":" + p.name, p.url))}" target="_blank" rel="noopener nofollow sponsored">
      <span class="n">${n}</span>
      <span class="pn">${hi(p.name)}</span>
      <span class="go">보러가기 ›</span>
    </a>`;
  }).join("");
}

function issueCard(iss, feature){
  const cover = iss.cover ? `<img class="${feature ? "cover" : "th"}" src="${esc(iss.cover)}" alt="">`
                          : `<div class="${feature ? "cover" : "th"}"></div>`;
  const cnt = (iss.items || []).length;
  const live = (iss.items || []).filter(p => p.url).length;
  const sub = `상품 ${cnt}${live ? " · 링크 " + live : ""} · ${esc(iss.date || "")}`;
  const post = iss.permalink
    ? `<a class="post" href="${esc(track(iss.no + ":post", iss.permalink))}" target="_blank" rel="noopener">📷 인스타에서 이 호 보기</a>` : "";

  if (feature) {
    return `<article class="feature" data-c="${esc(iss.cat)}">
      ${cover}
      <div class="body">
        <div class="meta">${esc(iss.no)}호 · ${iss.cat === "beauty" ? "💄 뷰티" : "👗 패션"}</div>
        <div class="ttl">${hi(iss.title)}</div>
        <div class="sub">${sub}</div>
      </div>
      <div class="prods" style="display:block">
        ${prodList(iss)}
        ${post}
      </div>
    </article>`;
  }
  return `<article class="issue${Q ? " open" : ""}" data-c="${esc(iss.cat)}">
    <div class="row" onclick="this.parentNode.classList.toggle('open')">
      ${cover}
      <div>
        <div class="meta">${esc(iss.no)}호 · ${iss.cat === "beauty" ? "💄 뷰티" : "👗 패션"}</div>
        <div class="ttl">${hi(iss.title)}</div>
        <div class="sub">${sub}</div>
      </div>
      <span class="chev">›</span>
    </div>
    <div class="prods">
      ${prodList(iss)}
      ${post}
    </div>
  </article>`;
}

function render(){
  const app  = document.getElementById("app");
  const hits = document.getElementById("hits");
  const byCat = (DATA.issues || []).filter(i => CAT === "all" || i.cat === CAT);
  const all = byCat.filter(matchIssue);

  document.getElementById("search").classList.toggle("has", !!Q);

  // 검색 중 — 최신호 카드 없이 결과 리스트만
  if (Q) {
    const n = all.reduce((s, i) =>
      s + (i.items || []).filter(p => norm(p.name).includes(norm(Q))).length, 0);
    hits.textContent = all.length
      ? `“${Q}” — ${all.length}개 호${n ? ` · 아이템 ${n}개` : ""}`
      : "";
    app.innerHTML = all.length
      ? all.map(i => issueCard(i, false)).join("")
      : `<div class="empty">“${esc(Q)}” 결과가 없어요 🍒<br>DM 주시면 대신 찾아드릴게요.</div>`;
    return;
  }

  hits.textContent = "";
  if (!all.length) {
    app.innerHTML = `<div class="empty">아직 발행된 호가 없어요 🍒<br>곧 올라옵니다.</div>`;
    return;
  }
  const [latest, ...rest] = all;
  let h = `<div class="sec-h"><span>📕 최신호</span><i class="bar"></i></div>` + issueCard(latest, true);
  if (rest.length) {
    h += `<div class="sec-h"><span>📚 지난 호</span><i class="cnt">${rest.length}</i><i class="bar"></i></div>`;
    h += rest.map(i => issueCard(i, false)).join("");
  }
  app.innerHTML = h;
}

document.getElementById("tabs").addEventListener("click", e => {
  const b = e.target.closest("button");
  if (!b) return;
  document.querySelectorAll("#tabs button").forEach(x => x.classList.remove("on"));
  b.classList.add("on");
  CAT = b.dataset.c;
  render();
});

const qEl = document.getElementById("q");
let t = null;
qEl.addEventListener("input", () => {
  clearTimeout(t);
  t = setTimeout(() => { Q = qEl.value.trim(); render(); }, 120);
});
document.getElementById("clr").addEventListener("click", () => {
  qEl.value = ""; Q = ""; render(); qEl.focus();
});

fetch("links.json?v=" + Date.now())
  .then(r => r.json())
  .then(d => {
    DATA = d;
    document.getElementById("social").innerHTML = (d.social || []).map(s =>
      `<a href="${esc(track('social:'+s.label, s.url))}" target="_blank" rel="noopener">${esc(s.icon)}</a>`).join("");
    document.getElementById("notice").innerHTML = d.notice ? `<div class="notice">${esc(d.notice)}</div>` : "";
    render();
  })
  .catch(() => render());
</script>
</body>
</html>
